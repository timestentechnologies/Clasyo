{% extends 'core/admin_dashboard.html' %}
{% load static %}

{% block page_title %}Calendar{% endblock %}

{% block content %}
<div class="d-flex justify-content-end mb-3">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEventModal">
        <i class="fas fa-plus"></i> Add Event
    </button>
</div>

<div class="modern-card">
    <div id="calendar"></div>
</div>

<!-- Add Event Modal -->
<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(180deg, #1E3A5F 0%, #2C5282 100%); color: white;">
                <h5 class="modal-title"><i class="fas fa-calendar-plus"></i> Add Event</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addEventForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Event Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="event_type" class="form-label">Event Type</label>
                        <select class="form-select" id="event_type" name="event_type" required>
                            <option value="holiday">Holiday</option>
                            <option value="exam">Examination</option>
                            <option value="meeting">Meeting</option>
                            <option value="event">School Event</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="start_date" class="form-label">Start Date &amp; Time</label>
                        <div class="row g-2">
                            <div class="col-7 col-md-8">
                                <input type="date" class="form-control" id="start_date" name="start_date" required>
                            </div>
                            <div class="col-5 col-md-4">
                                <input type="time" class="form-control" id="start_time" name="start_time">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="end_date" class="form-label">End Date &amp; Time</label>
                        <div class="row g-2">
                            <div class="col-7 col-md-8">
                                <input type="date" class="form-control" id="end_date" name="end_date" required>
                            </div>
                            <div class="col-5 col-md-4">
                                <input type="time" class="form-control" id="end_time" name="end_time">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" name="location">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                </form>
                <div id="selected-date-events" class="mt-3" style="display: none;">
                    <h6 class="mb-2">Events on <span id="selected-date-label"></span></h6>
                    <ul id="selected-date-events-list" class="list-unstyled small mb-0"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitEvent()">Add Event</button>
            </div>
        </div>
    </div>
</div>

<style>
#calendar {
    width: 100%;
}
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border-light);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    overflow: hidden;
}
.calendar-weekday {
    background: linear-gradient(135deg, var(--primary-navy), var(--secondary-navy));
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
}
.calendar-day {
    background: white;
    padding: 10px;
    min-height: 120px;
    position: relative;
    border: 1px solid var(--border-light);
}
.calendar-day.other-month {
    background: var(--bg-light);
    color: var(--text-muted);
}
.calendar-day.today {
    background: rgba(77, 208, 225, 0.1);
    border: 2px solid var(--accent-cyan) !important;
}
.calendar-day-number {
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 8px;
    font-size: 16px;
}
.calendar-event-dot {
    width: 8px;
    height: 8px;
    background: var(--accent-cyan);
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
}
.calendar-event-item {
    background: var(--accent-cyan);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-top: 4px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.calendar-event-item:hover {
    background: var(--primary-navy);
}
@media (max-width: 768px) {
    .calendar-header {
        flex-wrap: nowrap;
        gap: 8px;
    }
    .calendar-header h3 {
        font-size: 18px;
    }
    .calendar-header .btn {
        padding: 6px 10px;
        font-size: 12px;
        white-space: nowrap;
    }
    .calendar-grid {
        grid-template-columns: repeat(7, minmax(0, 1fr));
    }
    .calendar-weekday {
        padding: 10px 4px;
        font-size: 11px;
    }
    .calendar-day {
        padding: 6px;
        min-height: 80px;
    }
}

/* Dark mode adjustments for calendar */
[data-theme="dark"] .calendar-grid,
.theme-dark .calendar-grid {
    background: rgba(15, 23, 42, 0.9);
    border-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] .calendar-day,
.theme-dark .calendar-day {
    background: rgba(15, 23, 42, 0.9);
    border-color: rgba(148, 163, 184, 0.3);
}

[data-theme="dark"] .calendar-day.other-month,
.theme-dark .calendar-day.other-month {
    background: transparent;
    color: rgba(148, 163, 184, 0.5);
}

[data-theme="dark"] .calendar-day-number,
.theme-dark .calendar-day-number {
    color: #e5e7eb;
}

[data-theme="dark"] .calendar-weekday,
.theme-dark .calendar-weekday {
    background: linear-gradient(135deg, #020617, #0f172a);
}

[data-theme="dark"] .calendar-day.today,
.theme-dark .calendar-day.today {
    background: rgba(56, 189, 248, 0.12);
    border-color: rgba(56, 189, 248, 0.8) !important;
}

/* Dark mode adjustments for Add Event modal */
[data-theme="dark"] #addEventModal .modal-content,
.theme-dark #addEventModal .modal-content {
    background-color: #020617;
    color: #e5e7eb;
    border-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] #addEventModal .modal-header,
.theme-dark #addEventModal .modal-header {
    border-bottom-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] #addEventModal .modal-footer,
.theme-dark #addEventModal .modal-footer {
    border-top-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] #addEventModal .form-label,
.theme-dark #addEventModal .form-label {
    color: #e5e7eb;
}

[data-theme="dark"] #addEventModal .form-control,
[data-theme="dark"] #addEventModal .form-select,
.theme-dark #addEventModal .form-control,
.theme-dark #addEventModal .form-select {
    background-color: #020617;
    border-color: rgba(148, 163, 184, 0.5);
    color: #e5e7eb;
}

[data-theme="dark"] #addEventModal .form-control::placeholder,
.theme-dark #addEventModal .form-control::placeholder {
    color: rgba(148, 163, 184, 0.7);
}

[data-theme="dark"] #addEventModal .btn-primary,
.theme-dark #addEventModal .btn-primary {
    background-color: #22d3ee;
    border-color: #22d3ee;
    color: #020617;
}

[data-theme="dark"] #addEventModal .btn-secondary,
.theme-dark #addEventModal .btn-secondary {
    background-color: #1f2937;
    border-color: #4b5563;
}

/* Dark mode for generic showMessage modal (used by viewEvent) */
[data-theme="dark"] .modal-content,
.theme-dark .modal-content {
    background-color: #020617;
    color: #e5e7eb;
    border-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] .modal-header,
.theme-dark .modal-header {
    background-color: #0f172a;
    border-bottom-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] .modal-footer,
.theme-dark .modal-footer {
    border-top-color: rgba(148, 163, 184, 0.4);
}

[data-theme="dark"] .modal-title,
.theme-dark .modal-title {
    color: #e5e7eb;
}

[data-theme="dark"] .btn-close,
.theme-dark .btn-close {
    filter: invert(1);
}
</style>

<script>
function submitEvent() {
    const form = document.getElementById('addEventForm');
    const formData = new FormData(form);
    
    fetch("{% url 'core:calendar_event_create' school_slug=school_slug %}", {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': formData.get('csrftoken')
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showSuccessAndReload('Event created successfully!');
        } else {
            showError(data.error || 'Failed to create event');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showError('Failed to create event: ' + error.message);
    });
}

// Generate calendar with clickable days and modal integration
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    if (!calendarEl) return;

    const today = new Date();
    let currentMonth = today.getMonth();
    let currentYear = today.getFullYear();
    let calendarEvents = [];

    function pad2(num) {
        return num.toString().padStart(2, '0');
    }

    function formatDate(year, monthIndex, day) {
        return `${year}-${pad2(monthIndex + 1)}-${pad2(day)}`;
    }

    function loadAllEventsAndRender() {
        fetch("{% url 'core:calendar_events' school_slug=school_slug %}")
            .then(response => response.json())
            .then(data => {
                if (data.success && Array.isArray(data.events)) {
                    calendarEvents = data.events;
                } else {
                    calendarEvents = [];
                }
                generateCalendar(currentMonth, currentYear);
            })
            .catch(error => {
                console.error('Failed to load calendar events', error);
                generateCalendar(currentMonth, currentYear);
            });
    }

    function generateCalendar(month, year) {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                           'July', 'August', 'September', 'October', 'November', 'December'];
        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        let html = `
            <div class="calendar-header">
                <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <h3>${monthNames[month]} ${year}</h3>
                <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="calendar-grid">
        `;

        // Weekday headers
        weekdays.forEach(day => {
            html += `<div class="calendar-weekday">${day}</div>`;
        });

        // Get first day of month and number of days
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();

        const prevMonthIndex = month === 0 ? 11 : month - 1;
        const prevYear = month === 0 ? year - 1 : year;
        const nextMonthIndex = month === 11 ? 0 : month + 1;
        const nextYear = month === 11 ? year + 1 : year;

        // Previous month days
        for (let i = firstDay - 1; i >= 0; i--) {
            const day = daysInPrevMonth - i;
            const dateStr = formatDate(prevYear, prevMonthIndex, day);
            html += `<div class="calendar-day other-month" data-date="${dateStr}"><div class="calendar-day-number">${day}</div></div>`;
        }

        // Current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
            const todayClass = isToday ? 'today' : '';
            const dateStr = formatDate(year, month, day);
            html += `
                <div class="calendar-day ${todayClass}" data-date="${dateStr}">
                    <div class="calendar-day-number">${day}</div>
                    ${isToday ? '<div class="calendar-event-item">Today</div>' : ''}
                </div>
            `;
        }

        // Next month days to fill grid
        const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
        const remainingCells = totalCells - (firstDay + daysInMonth);
        for (let day = 1; day <= remainingCells; day++) {
            const dateStr = formatDate(nextYear, nextMonthIndex, day);
            html += `<div class="calendar-day other-month" data-date="${dateStr}"><div class="calendar-day-number">${day}</div></div>`;
        }

        html += '</div>';
        calendarEl.innerHTML = html;
        bindDayClickHandlers();
        applyEventsToCalendar();
    }

    function applyEventsToCalendar() {
        if (!Array.isArray(calendarEvents) || !calendarEvents.length) {
            return;
        }

        calendarEvents.forEach(ev => {
            if (!ev.start) return;
            const dateKey = ev.start.substring(0, 10);
            const cell = calendarEl.querySelector('.calendar-day[data-date="' + dateKey + '"]');
            if (!cell) return;

            let container = cell.querySelector('.calendar-events-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'calendar-events-container mt-1';
                cell.appendChild(container);
            }

            const item = document.createElement('div');
            item.className = 'calendar-event-item';
            item.textContent = ev.title;
            item.addEventListener('click', function(e) {
                // Prevent the day click handler from opening the Add Event modal
                e.stopPropagation();
                showCalendarEventDetails(ev);
            });
            container.appendChild(item);
        });
    }

    function showCalendarEventDetails(ev) {
        let html = '';
        html += '<strong>Title:</strong> ' + (ev.title || '') + '<br>';
        html += '<strong>Type:</strong> ' + (ev.event_type || '') + '<br>';
        html += '<strong>Date:</strong> ' + (ev.start_date_display || '') + '<br>';
        if (ev.location) {
            html += '<strong>Location:</strong> ' + ev.location + '<br>';
        }
        if (ev.description) {
            html += '<strong>Description:</strong> ' + ev.description;
        }

        if (typeof showMessage === 'function') {
            showMessage('Event Details', html, true);
        } else {
            // Fallback if the helper is not available
            let fallback = (ev.title || 'Event');
            if (ev.start_date_display) {
                fallback += '\n' + ev.start_date_display;
            }
            if (ev.location) {
                fallback += '\nLocation: ' + ev.location;
            }
            if (ev.description) {
                fallback += '\n' + ev.description;
            }
            alert(fallback);
        }
    }

    function bindDayClickHandlers() {
        const cells = calendarEl.querySelectorAll('.calendar-day');
        cells.forEach(cell => {
            const dateStr = cell.getAttribute('data-date');
            if (!dateStr) return;
            cell.addEventListener('click', function() {
                loadEventsForDate(dateStr);
            });
        });
    }

    function loadEventsForDate(dateStr) {
        const startDateInput = document.getElementById('start_date');
        const endDateInput = document.getElementById('end_date');
        if (startDateInput) startDateInput.value = dateStr;
        if (endDateInput) endDateInput.value = dateStr;

        fetch("{% url 'core:calendar_events' school_slug=school_slug %}?date=" + encodeURIComponent(dateStr))
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('selected-date-events');
                const label = document.getElementById('selected-date-label');
                const list = document.getElementById('selected-date-events-list');
                if (container && label && list) {
                    label.textContent = dateStr;
                    list.innerHTML = '';

                    if (data.success && Array.isArray(data.events) && data.events.length) {
                        data.events.forEach(ev => {
                            const li = document.createElement('li');
                            li.innerHTML = `<strong>${ev.title}</strong> <small class="text-muted">${ev.start_date_display}</small>`;
                            list.appendChild(li);
                        });
                    } else {
                        const li = document.createElement('li');
                        li.className = 'text-muted';
                        li.textContent = 'No events for this day.';
                        list.appendChild(li);
                    }

                    container.style.display = 'block';
                }

                showAddEventModal();
            })
            .catch(error => {
                console.error('Failed to load events for date', error);
                showAddEventModal();
            });
    }

    function showAddEventModal() {
        const modalEl = document.getElementById('addEventModal');
        if (!modalEl) return;

        if (window.bootstrap && window.bootstrap.Modal) {
            const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
            modal.show();
        } else if (typeof $ !== 'undefined' && typeof $(modalEl).modal === 'function') {
            $(modalEl).modal('show');
        }
    }

    window.currentMonth = currentMonth;
    window.currentYear = currentYear;

    window.changeMonth = function(delta) {
        currentMonth += delta;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        } else if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        }
        window.currentMonth = currentMonth;
        window.currentYear = currentYear;
        generateCalendar(currentMonth, currentYear);
    };

    loadAllEventsAndRender();
});
</script>
{% endblock %}
