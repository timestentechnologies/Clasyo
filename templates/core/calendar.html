{% extends 'core/admin_dashboard.html' %}
{% load static %}

{% block page_title %}Calendar{% endblock %}

{% block content %}
<div class="d-flex justify-content-end mb-3">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEventModal">
        <i class="fas fa-plus"></i> Add Event
    </button>
</div>

<div class="modern-card">
    <div id="calendar"></div>
</div>

<!-- Add Event Modal -->
<div class="modal fade" id="addEventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(180deg, #1E3A5F 0%, #2C5282 100%); color: white;">
                <h5 class="modal-title"><i class="fas fa-calendar-plus"></i> Add Event</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addEventForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Event Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="event_type" class="form-label">Event Type</label>
                        <select class="form-select" id="event_type" name="event_type" required>
                            <option value="holiday">Holiday</option>
                            <option value="exam">Examination</option>
                            <option value="meeting">Meeting</option>
                            <option value="event">School Event</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="start_date" class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="start_date" name="start_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="end_date" class="form-label">End Date</label>
                        <input type="date" class="form-control" id="end_date" name="end_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" name="location">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitEvent()">Add Event</button>
            </div>
        </div>
    </div>
</div>

<style>
.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border-light);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    overflow: hidden;
}
.calendar-weekday {
    background: linear-gradient(135deg, var(--primary-navy), var(--secondary-navy));
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
}
.calendar-day {
    background: white;
    padding: 10px;
    min-height: 120px;
    position: relative;
    border: 1px solid var(--border-light);
}
.calendar-day.other-month {
    background: var(--bg-light);
    color: var(--text-muted);
}
.calendar-day.today {
    background: rgba(77, 208, 225, 0.1);
    border: 2px solid var(--accent-cyan) !important;
}
.calendar-day-number {
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 8px;
    font-size: 16px;
}
.calendar-event-dot {
    width: 8px;
    height: 8px;
    background: var(--accent-cyan);
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
}
.calendar-event-item {
    background: var(--accent-cyan);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-top: 4px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.calendar-event-item:hover {
    background: var(--primary-navy);
}
</style>

<script>
function submitEvent() {
    const form = document.getElementById('addEventForm');
    const formData = new FormData(form);
    
    fetch("{% url 'core:calendar_event_create' school_slug=school_slug %}", {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': formData.get('csrftoken')
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showSuccessAndReload('Event created successfully!');
        } else {
            showError(data.error || 'Failed to create event');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showError('Failed to create event: ' + error.message);
    });
}

// Generate calendar
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    
    generateCalendar(currentMonth, currentYear);
    
    function generateCalendar(month, year) {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                           'July', 'August', 'September', 'October', 'November', 'December'];
        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        let html = `
            <div class="calendar-header">
                <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <h3>${monthNames[month]} ${year}</h3>
                <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="calendar-grid">
        `;
        
        // Weekday headers
        weekdays.forEach(day => {
            html += `<div class="calendar-weekday">${day}</div>`;
        });
        
        // Get first day of month and number of days
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        
        // Previous month days
        for (let i = firstDay - 1; i >= 0; i--) {
            const day = daysInPrevMonth - i;
            html += `<div class="calendar-day other-month"><div class="calendar-day-number">${day}</div></div>`;
        }
        
        // Current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
            const todayClass = isToday ? 'today' : '';
            html += `
                <div class="calendar-day ${todayClass}">
                    <div class="calendar-day-number">${day}</div>
                    ${isToday ? '<div class="calendar-event-item">Today</div>' : ''}
                </div>
            `;
        }
        
        // Next month days to fill grid
        const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
        const remainingCells = totalCells - (firstDay + daysInMonth);
        for (let day = 1; day <= remainingCells; day++) {
            html += `<div class="calendar-day other-month"><div class="calendar-day-number">${day}</div></div>`;
        }
        
        html += '</div>';
        calendarEl.innerHTML = html;
    }
    
    window.currentMonth = currentMonth;
    window.currentYear = currentYear;
    
    window.changeMonth = function(delta) {
        window.currentMonth += delta;
        if (window.currentMonth > 11) {
            window.currentMonth = 0;
            window.currentYear++;
        } else if (window.currentMonth < 0) {
            window.currentMonth = 11;
            window.currentYear--;
        }
        generateCalendar(window.currentMonth, window.currentYear);
    };
});
</script>
{% endblock %}
