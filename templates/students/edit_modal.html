<form method="post" id="studentEditForm" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="hidden" name="student_id" value="{{ student.id }}">
    
    <!-- Student Basic Information -->
    <h6 class="mb-3 text-primary"><i class="fas fa-user"></i> Basic Information</h6>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">First Name *</label>
            <input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Last Name *</label>
            <input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" value="{{ student.email }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Password</label>
            <input type="text" name="password" class="form-control" value="student123">
            <small class="text-muted">Default: student123 - You can edit to change</small>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Admission Number *</label>
            <input type="text" name="admission_number" class="form-control" value="{{ student.admission_number }}" required readonly>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Date of Birth *</label>
            <input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth|date:'Y-m-d' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Gender *</label>
            <select name="gender" class="form-control" required>
                <option value="">Select Gender</option>
                <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                <option value="other" {% if student.gender == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Blood Group</label>
            <select name="blood_group" class="form-control">
                <option value="">Select Blood Group</option>
                <option value="A+" {% if student.blood_group == 'A+' %}selected{% endif %}>A+</option>
                <option value="A-" {% if student.blood_group == 'A-' %}selected{% endif %}>A-</option>
                <option value="B+" {% if student.blood_group == 'B+' %}selected{% endif %}>B+</option>
                <option value="B-" {% if student.blood_group == 'B-' %}selected{% endif %}>B-</option>
                <option value="O+" {% if student.blood_group == 'O+' %}selected{% endif %}>O+</option>
                <option value="O-" {% if student.blood_group == 'O-' %}selected{% endif %}>O-</option>
                <option value="AB+" {% if student.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                <option value="AB-" {% if student.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
            </select>
        </div>
    </div>
    
    <!-- Address Information -->
    <h6 class="mb-3 mt-3 text-primary"><i class="fas fa-map-marker-alt"></i> Address Details</h6>
    <div class="row">
        <div class="col-md-12 mb-3">
            <label class="form-label">Current Address *</label>
            <textarea name="current_address" class="form-control" rows="2" required>{{ student.current_address }}</textarea>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">City *</label>
            <input type="text" name="city" class="form-control" value="{{ student.city }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">State *</label>
            <input type="text" name="state" class="form-control" value="{{ student.state }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Postal Code</label>
            <input type="text" name="postal_code" class="form-control" value="{{ student.postal_code }}">
        </div>
    </div>
    
    <!-- Father Details -->
    <h6 class="mb-3 mt-3 text-primary"><i class="fas fa-male"></i> Father's Details</h6>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Father's Name *</label>
            <input type="text" name="father_name" class="form-control" value="{{ student.father_name }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Father's Phone</label>
            <input type="tel" name="father_phone" class="form-control" value="{{ student.father_phone }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Father's Email</label>
            <input type="email" name="father_email" class="form-control" value="{{ student.father_email }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Father's Occupation</label>
            <input type="text" name="father_occupation" class="form-control" value="{{ student.father_occupation }}">
        </div>
    </div>
    
    <!-- Mother Details -->
    <h6 class="mb-3 mt-3 text-primary"><i class="fas fa-female"></i> Mother's Details</h6>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Mother's Name *</label>
            <input type="text" name="mother_name" class="form-control" value="{{ student.mother_name }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Mother's Phone</label>
            <input type="tel" name="mother_phone" class="form-control" value="{{ student.mother_phone }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Mother's Email</label>
            <input type="email" name="mother_email" class="form-control" value="{{ student.mother_email }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Mother's Occupation</label>
            <input type="text" name="mother_occupation" class="form-control" value="{{ student.mother_occupation }}">
        </div>
    </div>
    
    <!-- Guardian Details (Optional) -->
    <h6 class="mb-3 mt-3 text-primary"><i class="fas fa-user-shield"></i> Guardian Details (Optional)</h6>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Guardian's Name</label>
            <input type="text" name="guardian_name" class="form-control" value="{{ student.guardian_name }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Guardian's Phone</label>
            <input type="tel" name="guardian_phone" class="form-control" value="{{ student.guardian_phone }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Guardian's Email</label>
            <input type="email" name="guardian_email" class="form-control" value="{{ student.guardian_email }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Guardian's Relation</label>
            <input type="text" name="guardian_relation" class="form-control" value="{{ student.guardian_relation }}" placeholder="e.g., Uncle, Aunt">
        </div>
    </div>
</form>

<script>
// This script will be available when the form is loaded into the modal
window.submitEditStudent = function(studentId) {
    const form = document.getElementById('studentEditForm');
    const formData = new FormData(form);
    
    fetch(window.location.pathname + studentId + '/edit/', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        // Close edit modal
        const editModal = bootstrap.Modal.getInstance(document.getElementById('editStudentModal'));
        if (editModal) {
            editModal.hide();
        }
        
        if (data.success) {
            if (window.showMessage) {
                window.showMessage('Success!', 'Student updated successfully!', true);
            }
            setTimeout(() => location.reload(), 1500);
        } else {
            if (window.showMessage) {
                window.showMessage('Error', data.error || 'Failed to update student', false);
            }
        }
    })
    .catch(error => {
        if (window.showMessage) {
            window.showMessage('Error', 'Failed to update student: ' + error.message, false);
        }
        console.error(error);
    });
};
</script>
