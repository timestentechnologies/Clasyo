{% extends 'frontend/base.html' %}
{% load static %}

{% block title %}Reset Password - Clasyo{% endblock %}

{% block content %}
<section class="py-5" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg" style="border-radius: 20px; overflow: hidden;">
                    <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #1E3A5F 0%, #4DD0E1 100%);">
                        <h3 class="mb-0"><i class="fas fa-key me-2"></i>Reset Your Password</h3>
                    </div>
                    <div class="card-body p-5">
                        <p class="text-muted mb-4">Please enter your new password below.</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control" placeholder="Enter new password" required minlength="8">
                                </div>
                                <small class="text-muted">Minimum 8 characters</small>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="password2" class="form-control" placeholder="Confirm new password" required minlength="8">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100" style="background: linear-gradient(135deg, #1E3A5F 0%, #4DD0E1 100%); border: none; padding: 0.75rem;">
                                <i class="fas fa-check me-2"></i>Reset Password
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="{% url 'frontend:home' %}" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i> Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
