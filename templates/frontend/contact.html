<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - School Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'frontend:home' %}">
                <i class="fas fa-graduation-cap"></i> School Management System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'frontend:home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'frontend:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'frontend:pricing' %}">Pricing</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'frontend:contact' %}">Contact</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-2" href="{% url 'accounts:login' %}">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

<section class="py-5">
    <div class="container">
        <h1 class="text-center mb-5">Contact Us</h1>
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-control" name="subject" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Message</button>
                </form>
                
                <hr class="my-5">
                
                <h4>Other Ways to Reach Us</h4>
                <p><i class="fas fa-envelope"></i> Email: support@schoolsaas.com</p>
                <p><i class="fas fa-phone"></i> Phone: +1 (555) 123-4567</p>
                <p><i class="fas fa-map-marker-alt"></i> Address: 123 Education St, Learning City, ED 12345</p>
            </div>
        </div>
    </div>
</section>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2025 School Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
