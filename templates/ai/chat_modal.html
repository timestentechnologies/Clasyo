{% load static %}
<!-- AI Chat Modal -->
<style>
/* Typing indicator */
.typing { display: inline-flex; align-items: center; gap: 6px; }
.typing .dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; opacity: .6; animation: typingDots 1.2s infinite ease-in-out; }
.typing .dot:nth-child(2) { animation-delay: .2s; }
.typing .dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingDots { 0%, 80%, 100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-3px); opacity: 1; } }
/* Modern chat modal styles using brand colors */
.ai-modal .modal-content { border-radius: 14px; box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
.ai-modal .modal-header { background: linear-gradient(135deg, #1E3A5F 0%, #06B6D4 100%) !important; color: #fff; }
.ai-modal .modal-title { color: #fff !important; }
.chat-messages { border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem; background: #ffffff; color:#0f172a; max-height: 60vh; }
.chat-msg { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 0.75rem; }
.chat-msg .avatar { width: 34px; height: 34px; border-radius: 50%; display:flex; align-items:center; justify-content:center; color:#fff; background: linear-gradient(135deg, #1E3A5F 0%, #06B6D4 100%); flex: 0 0 34px; }
.chat-msg .avatar i { font-size: 16px; }
.chat-msg .bubble { max-width: 75%; padding: 0.6rem 0.8rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.35; }
.chat-msg.user { flex-direction: row-reverse; }
.chat-msg.user .bubble { background: #EEF2F7; color: #1a202c; border-top-right-radius: 6px; }
.chat-msg.ai .bubble { background: #F0FAFF; color: #0f172a; border-top-left-radius: 6px; border-left: 3px solid #06B6D4; }
.chat-input { display:flex; gap: 0.5rem; align-items: flex-end; }
.chat-input textarea { resize: none; max-height: 160px; border-radius: 10px; }
.btn-brand { background: linear-gradient(135deg, #06B6D4 0%, #22D3EE 100%); color: #fff; border: none; }
.btn-brand:hover { filter: brightness(0.95); color: #fff; }
.chat-footer { justify-content: space-between; }
/* Markdown content tweaks */
.chat-msg .bubble h1, .chat-msg .bubble h2, .chat-msg .bubble h3 { margin: .25rem 0 .5rem; font-weight: 700; }
.chat-msg .bubble h1 { font-size: 1.5rem; line-height: 1.2; }
.chat-msg .bubble h2 { font-size: 1.2rem; line-height: 1.25; }
.chat-msg .bubble h3 { font-size: 1.05rem; line-height: 1.3; }
.chat-msg .bubble p { margin: 0 0 .5rem; }
.chat-msg .bubble ul, .chat-msg .bubble ol { margin: .25rem 0 .5rem; padding-left: 1.25rem !important; }
.chat-msg .bubble ul { list-style: disc !important; }
.chat-msg .bubble ol { list-style: decimal !important; }
.chat-msg .bubble li { margin: .125rem 0; }
</style>
<div class="modal fade" id="aiChatModal" tabindex="-1" aria-labelledby="aiChatModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-lg modal-dialog-centered ai-modal">
    <div class="modal-content">
      <div class="modal-header" style="background: linear-gradient(135deg, #1E3A5F 0%, #06B6D4 100%); color:white;">
        <h5 class="modal-title" id="aiChatModalLabel" style="color:#ffffff !important;"><i class="fas fa-robot me-2"></i>AI Assistant</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body d-flex flex-column" style="max-height:70vh;">
        <div id="aiChatMessages" class="chat-messages flex-grow-1 overflow-auto mb-3"></div>
        <form id="aiChatForm" class="chat-input">
          <textarea id="aiPrompt" class="form-control" rows="1" placeholder="Ask me anything..." required></textarea>
          <button type="submit" class="btn btn-brand"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
      <div class="modal-footer chat-footer">
        <button type="button" class="btn btn-outline-secondary" id="aiClearChat">Clear</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
{% if school_slug %}
<script>
(function(){
  const form = document.getElementById('aiChatForm');
  if (!form) return;
  const promptField = document.getElementById('aiPrompt');
  const messagesBox = document.getElementById('aiChatMessages');
  const scrollToBottom = () => messagesBox.scrollTop = messagesBox.scrollHeight;
  const clearBtn = document.getElementById('aiClearChat');

  if (window.marked && window.marked.setOptions) {
    window.marked.setOptions({ gfm: true, breaks: true });
  }

  function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function bubble(role, html){
    const icon = role === 'user' ? 'fa-user' : 'fa-robot';
    return `<div class="chat-msg ${role}"><div class="avatar"><i class="fas ${icon}"></i></div><div class="bubble">${html}</div></div>`;
  }

  function appendUser(text){ messagesBox.insertAdjacentHTML('beforeend', bubble('user', esc(text))); scrollToBottom(); }
  function appendAI(html){ messagesBox.insertAdjacentHTML('beforeend', bubble('ai', html)); scrollToBottom(); }
  function renderAI(text){
    try{
      var raw = (window.marked && window.marked.parse) ? window.marked.parse(text) : fallbackRender(text);
      var clean = (window.DOMPurify && window.DOMPurify.sanitize) ? window.DOMPurify.sanitize(raw) : raw;
      return clean;
    }catch(e){ return fallbackRender(text); }
  }

  function normalizeMarkdown(text){
    var t = (text || '').toString();
    // Ensure separation after common lead-ins
    t = t.replace(/(It['’]s designed to|This means you can|This means it can)\s*:/gi, '$1:\n\n');
    // Convert inline bullets like ": * point * point" into proper list lines
    t = t.replace(/:\s*\*\s+/g, ':\n\n- ');
    // Replace any whitespace + * + space with a new list item
    t = t.replace(/\s\*\s+/g, '\n- ');
    // Replace bullets at line start
    t = t.replace(/^\*\s+/gm, '- ');
    // Convert dot bullets to hyphen bullets
    t = t.replace(/[•·]\s+/g, '\n- ');
    // Convert inline numbered items into proper list items
    t = t.replace(/:\s*(\d+)\.\s+/g, ':\n\n$1. ');
    t = t.replace(/(\s)(\d+)\.\s+/g, '\n$2. ');
    // Ensure each numbered item starts on its own line (no lookbehind for wide browser support)
    t = t.replace(/(^|[^\n])(\d+)\.\s/g, function(_, p1, p2){ return (p1 || '') + '\n' + p2 + '. '; });
    // Prefer bullets over numbers for style consistency
    t = t.replace(/^\s*(\d+)\.\s+/gm, '- ');
    // Ensure bullet title before colon is bolded (if not already)
    t = t.replace(/^\s*-\s+([^\n:]+):\s/gm, function(match, title){
      if (/\*\*/.test(title)) return match; // already bold
      return '- **' + title.trim() + '**: ';
    });
    // If first sentence before a colon looks like a heading, promote it to a heading
    if (!/^\s*#{1,6}\s/m.test(t)) {
      var firstColon = t.indexOf(':');
      if (firstColon > 15 && firstColon < 180) {
        var head = t.slice(0, firstColon).trim();
        var rest = t.slice(firstColon + 1).trim();
        if (head.split(/\s+/).length >= 3) {
          t = '### ' + head + '\n\n' + rest;
        }
      }
    }
    // If no heading present, add a small default heading
    if (!/^\s*#{1,6}\s/m.test(t)) {
      t = '### Response\n\n' + t;
    }
    return t;
  }

  function fallbackRender(text){
    // Minimal Markdown renderer: headings, bold, italics, bullets and numbered lists
    var t = normalizeMarkdown(text);
    var lines = t.split(/\r?\n/);
    var html = [];
    var listType = null; // 'ul' | 'ol' | null

    function openList(type){
      if (listType !== type){
        closeList();
        html.push(type === 'ol' ? '<ol>' : '<ul>');
        listType = type;
      }
    }
    function closeList(){
      if (listType){
        html.push(listType === 'ol' ? '</ol>' : '</ul>');
        listType = null;
      }
    }
    function escHtml(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function inline(md){
      var s = escHtml(md);
      // Bold: **text** or __text__
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/__(.+?)__/g, '<strong>$1</strong>');
      // Italic: *text* or _text_
      s = s.replace(/(^|[^*])\*(?!\s)(.+?)\*(?!\*)/g, '$1<em>$2</em>').replace(/_(.+?)_/g, '<em>$1</em>');
      return s;
    }

    for (var i=0;i<lines.length;i++){
      var line = lines[i];
      if (!line.trim()) { closeList(); continue; }
      var m;
      if ((m = line.match(/^\s*(#{1,6})\s+(.*)$/))) {
        closeList();
        var level = m[1].length; var content = inline(m[2]);
        html.push('<h'+level+'>'+content+'</h'+level+'>');
        continue;
      }
      if ((m = line.match(/^\s*-\s+(.*)$/))) {
        openList('ul');
        html.push('<li>'+inline(m[1])+'</li>');
        continue;
      }
      if ((m = line.match(/^\s*(\d+)\.\s+(.*)$/))) {
        openList('ol');
        html.push('<li>'+inline(m[2])+'</li>');
        continue;
      }
      closeList();
      html.push('<p>'+inline(line)+'</p>');
    }
    closeList();
    return html.join('\n');
  }

  if (clearBtn) clearBtn.addEventListener('click', function(){ messagesBox.innerHTML = ''; });

  // Auto-resize textarea and support Ctrl/Cmd+Enter to send
  promptField.addEventListener('input', function(){ this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 160) + 'px'; });
  promptField.addEventListener('keydown', function(e){ if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { form.dispatchEvent(new Event('submit', {cancelable:true})); } });
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const prompt = promptField.value.trim();
    if(!prompt) return;
    appendUser(prompt);
    scrollToBottom();
    promptField.value='';

    const thinkingId = 'thinking-' + Date.now();
    messagesBox.insertAdjacentHTML('beforeend', `<div id="${thinkingId}" class="chat-msg ai"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble"><span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div></div>`);
    scrollToBottom();

    try {
      const resp = await fetch('{% url "core:ai_chat_api" school_slug=school_slug %}', {
        method:'POST',
        headers: {
          'Content-Type':'application/x-www-form-urlencoded',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: new URLSearchParams({prompt})
      });

      let data;
      try {
        data = await resp.json();
      } catch (parseError) {
        throw new Error(`Server returned an invalid response (status ${resp.status})`);
      }

      const thinkingEl = document.getElementById(thinkingId);
      if (thinkingEl) thinkingEl.remove();

      if (!resp.ok) {
        const message = data && data.error ? data.error : `Server error (${resp.status})`;
        throw new Error(message);
      }

      if (data.answer){
        var md = normalizeMarkdown(data.answer);
        appendAI(renderAI(md));
      }else if(data.error){
        appendAI(`<span class="text-danger"><strong>Error:</strong> ${esc(data.error)}</span>`);
      }else{
        appendAI(`<span class="text-danger"><strong>Error:</strong> Unexpected response from server.</span>`);
      }
      scrollToBottom();
    }catch(err){
      const thinkingEl = document.getElementById(thinkingId);
      if (thinkingEl) thinkingEl.remove();
      appendAI(`<span class="text-danger"><strong>Error:</strong> ${esc(err.message || err)}</span>`);
      scrollToBottom();
    }
  });
})();
</script>
{% else %}
<script>
(function(){
  const form = document.getElementById('aiChatForm');
  if (!form) return;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    alert('AI chat is only available within a specific school context.');
  });
})();
</script>
{% endif %}
