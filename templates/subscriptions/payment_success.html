{% extends 'base.html' %}

{% block title %}Payment Successful{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                    </div>
                    <h4 class="card-title text-success mb-3">Payment Successful!</h4>
                    <p class="card-text">Your subscription has been activated successfully.</p>
                    <div class="mt-4">
                        <a href="{% url 'subscriptions:my_subscription' %}" class="btn btn-primary">
                            <i class="fas fa-eye"></i> View My Subscription
                        </a>
                        <a href="{% url 'frontend:dashboard' %}" class="btn btn-secondary">
                            <i class="fas fa-home"></i> Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
