<!-- Success/Error Message Modal - Global Component -->
<div class="modal fade" id="messageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" id="messageModalHeader" style="background: linear-gradient(180deg, #1E3A5F 0%, #2C5282 100%); color: white;">
                <h5 class="modal-title" id="messageModalTitle">
                    <i class="fas fa-info-circle me-2" id="messageModalIcon"></i>
                    <span id="messageModalTitleText">Message</span>
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="messageModalBody">
                <p class="mb-0">Operation completed successfully!</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="messageModalBtn">OK</button>
            </div>
        </div>
    </div>
</div>
